version: "3.8"

services:
  flight-monitor:
    build: .
    container_name: flytlv
    restart: unless-stopped
    ports:
      - "3737:3737"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - SCRAPER_PROXY=socks5://host.docker.internal:1080
    extra_hosts:
      - "host.docker.internal:host-gateway"
